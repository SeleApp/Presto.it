<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Presto.it - Annunci</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&family=Orbitron:wght@500;700&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <nav id="navbar" class="navbar navbar-expand-lg bg-black fixed-top">
      <div class="container">
        <a class="navbar-brand" href="./index.html">
          <img src="./media/logo.svg" alt="Logo Presto" class="logo-navbar" />
        </a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar" aria-controls="mainNavbar" aria-expanded="false" aria-label="Apri menu">
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="mainNavbar">
          <ul class="navbar-nav mx-auto mb-2 mb-lg-0">
            <li class="nav-item"><a class="nav-link" href="./index.html">Home</a></li>
            <li class="nav-item"><a class="nav-link active" href="./annunci.html">Annunci</a></li>
            <li class="nav-item"><a class="nav-link" href="./index.html#chi-siamo">Chi siamo</a></li>
          </ul>
          <div class="logo-spacer"></div>
        </div>
      </div>
    </nav>

    <header class="hero-annunci d-flex align-items-center">
      <div class="container text-center">
        <h1 class="display-5 mb-2">Pagina degli annunci</h1>
        <p class="mb-0">Filtra per categoria, prezzo e parola chiave.</p>
      </div>
    </header>

    <main class="py-5">
      <section class="container mb-4">
        <div class="row g-4">
          <div class="col-12 col-lg-3">
            <div class="filter-box h-100">
              <h2 class="h5 mb-3">Categorie</h2>
              <div id="categoryWrapper"></div>
            </div>
          </div>

          <div class="col-12 col-lg-9">
            <div class="filter-box mb-3">
              <div class="row g-3 align-items-end">
                <div class="col-12 col-md-5">
                  <label for="wordInput" class="form-label mb-1">Cerca annuncio</label>
                  <input id="wordInput" type="text" class="form-control" placeholder="Scrivi il nome..." />
                </div>
                <div class="col-12 col-md-5">
                  <label for="priceInput" class="form-label mb-1">Prezzo massimo: <span id="priceValue">100000</span> €</label>
                  <input id="priceInput" type="range" class="form-range" min="0" max="100000" step="1" value="100000" />
                </div>
                <div class="col-12 col-md-2 d-grid">
                  <button id="resetBtn" class="btn btn-yellow">Reset</button>
                </div>
              </div>
            </div>

            <div id="cardsWrapper" class="row g-3"></div>
          </div>
        </div>
      </section>
    </main>

    <footer class="py-4 bg-black text-center text-white">
      <small>Presto.it - Progetto didattico</small>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script src="./annunci.js"></script>
  </body>
</html>
